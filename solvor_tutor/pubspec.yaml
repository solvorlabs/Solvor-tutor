name: solvor_tutor
description: Offline-first AI-powered exam prep app for SSC and Banking exams.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  drift_flutter: ^0.2.0
  go_router: ^14.6.0
  flutter_riverpod: ^2.6.0
  riverpod: ^2.6.0
  uuid: ^4.5.0
  tflite_flutter: ^0.11.0
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/seed_data/taxonomy.json
    - assets/seed_data/seed_questions.json
    - assets/models/intent_classifier.tflite
